<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

    <title>Smart Contact Manager</title>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" href="#">📞</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">

        <!-- Navbar Links -->
        <ul class="navbar-nav mr-auto">
            <!-- Home link (always active) -->
            <li class="nav-item active">
                <a class="nav-link" href="/home">Home <span class="sr-only">(current)</span></a>
            </li>

            <!-- Dynamic page links -->
            <li class="nav-item" th:each="link : ${navLinks}">
                <a class="nav-link" th:href="${link.url}" th:text="${link.title}"></a>
            </li>

            <!-- Optional dropdown -->
            <li class="nav-item dropdown" th:if="${dropdownLinks != null}">
                <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                   data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                    Menu
                </a>
                <div class="dropdown-menu" aria-labelledby="navbarDropdown">
                    <a class="dropdown-item" th:each="d : ${dropdownLinks}" th:href="${d.url}" th:text="${d.title}"></a>
                </div>
            </li>
        </ul>

        <!-- Search bar (only shows when searchEnabled = true) -->
        <form class="form-inline my-2 my-lg-0" th:if="${searchEnabled}">
            <input class="form-control mr-sm-2"
                   type="search"
                   placeholder="Search"
                   aria-label="Search">
            <button class="btn btn-outline-success my-2 my-sm-0"
                    type="submit">
                Search
            </button>
        </form>

    </div>
</nav>
<!-- End Navbar -->

<!-- Page Content -->
<div class="flex-grow-1" th:replace="${content}">
    <!-- Child templates content will be injected here -->
</div>

<!-- Footer -->
<footer class="bg-dark text-light pt-4 pb-3 mt-auto">
    <div class="container">
        <div class="row">

            <!-- Brand / About -->
            <div class="col-md-4 mb-3">
                <h5 class="fw-bold">Smart Contact Manager</h5>
                <p class="small mb-0">
                    Your trusted partner for food delivery & restaurant services.
                </p>
            </div>

            <!-- Quick Links -->
            <div class="col-md-4 mb-3">
                <h6 class="fw-bold">Quick Links</h6>
                <ul class="list-unstyled small">
                    <li><a href="#" class="text-light text-decoration-none">Home</a></li>
                    <li><a href="#" class="text-light text-decoration-none">Services</a></li>
                    <li><a href="#" class="text-light text-decoration-none">About Us</a></li>
                    <li><a href="#" class="text-light text-decoration-none">Contact</a></li>
                </ul>
            </div>

            <!-- Contact -->
            <div class="col-md-4 mb-3">
                <h6 class="fw-bold">Contact</h6>
                <p class="small mb-1"><img src="https://cdn-icons-png.flaticon.com/512/1250/1250615.png"
                                           alt="Phone" style="width:16px;height:16px;"> +91 98765 43210</p>
                <p class="small mb-1">📧 support@restroplus.com</p>
                <p class="small">📍 Kolkata, India</p>
            </div>
        </div>

        <hr class="border-light">

        <div class="text-center small">
            © 2025 Smart Contact Manager — All Rights Reserved
        </div>
    </div>
</footer>
<!-- End Footer -->

<!-- Optional JavaScript -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>

</body>
</html>
