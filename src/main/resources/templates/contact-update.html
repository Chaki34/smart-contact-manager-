<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Contact</title>
    <!-- Inline Bootstrap via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Update Contact</h4>
                </div>
                <div class="card-body">

                    <!-- Success / Error Messages -->
                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{'/contact-update/' + ${contact.id}}" method="post" enctype="multipart/form-data"
                          th:object="${contact}">

                        <!-- Full Name -->
                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold">Full Name</label>
                            <input type="text" th:field="*{name}" class="form-control" id="name" placeholder="Enter full name" required>
                            <div th:if="${#fields.hasErrors('name')}" class="text-danger small" th:errors="*{name}"></div>
                        </div>

                        <!-- Nickname -->
                        <div class="mb-3">
                            <label for="nickname" class="form-label fw-bold">Nickname</label>
                            <input type="text" th:field="*{nickname}" class="form-control" id="nickname" placeholder="Enter nickname" required>
                            <div th:if="${#fields.hasErrors('nickname')}" class="text-danger small" th:errors="*{nickname}"></div>
                        </div>

                        <!-- Work -->
                        <div class="mb-3">
                            <label for="work" class="form-label fw-bold">Work / Job</label>
                            <input type="text" th:field="*{work}" class="form-control" id="work" placeholder="Enter work" required>
                            <div th:if="${#fields.hasErrors('work')}" class="text-danger small" th:errors="*{work}"></div>
                        </div>

                        <!-- Phone Number -->
                        <div class="mb-3">
                            <label for="phoneno" class="form-label fw-bold">Phone Number</label>
                            <input type="text" th:field="*{phoneno}" class="form-control" id="phoneno" placeholder="10-digit phone" required>
                            <div th:if="${#fields.hasErrors('phoneno')}" class="text-danger small" th:errors="*{phoneno}"></div>
                        </div>

                        <!-- Description -->
                        <div class="mb-3">
                            <label for="description" class="form-label fw-bold">Description</label>
                            <textarea th:field="*{description}" class="form-control" id="description" rows="3" placeholder="Enter description"></textarea>
                        </div>

                        <!-- Profile Image -->
                        <div class="mb-3">
                            <label for="imageFile" class="form-label fw-bold">Profile Image</label>
                            <input type="file" name="imageFile" class="form-control" id="imageFile">
                            <div class="mt-2">
                                <span class="me-2 fw-semibold">Current Image:</span>
                                <img th:src="@{'/uploads/' + ${contact.image}}" alt="contact image" class="img-thumbnail" style="height: 100px;">
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-success">Update Contact</button>
                            <a th:href="@{/dashboard}" class="btn btn-secondary">Cancel</a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
