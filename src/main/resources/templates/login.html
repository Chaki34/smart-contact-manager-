<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login — Smart Contact Manager</title>
    <link rel="stylesheet"
          th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css}">
</head>
<body class="bg-light">

<section class="vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">

                <div class="card shadow-sm border-0 rounded-4 p-4">
                    <h3 class="text-center mb-4 fw-bold">Smart Contact Manager</h3>
                    <h5 class="text-center mb-4 text-muted">Sign In</h5>

                    <!-- Display error message from Spring Security -->
                    <div th:if="${param.error}" class="alert alert-danger text-center">
                        Invalid email or password!
                    </div>

                    <!-- Display logout message -->
                    <div th:if="${param.logout}" class="alert alert-success text-center">
                        You have been logged out successfully.
                    </div>

                    <!-- Display flash message from registration -->
                    <div th:if="${message}" class="alert alert-success text-center">
                        <span th:text="${message}"></span>
                    </div>

                    <!-- Login Form -->
                    <form th:action="@{/doLogin}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" name="username" class="form-control" placeholder="Enter your email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">Sign In</button>
                        </div>

                        <div class="text-center mt-3">
                            <a th:href="@{/register}" class="text-decoration-none">Don't have an account? Register</a>
                        </div>

                    </form>
                </div>

            </div>
        </div>
    </div>
</section>

</body>
</html>
