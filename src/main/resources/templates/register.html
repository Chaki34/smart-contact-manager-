<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Registration — Smart Contact Manager</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css}">

    <!-- Custom CSS (optional) -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light">

<section class="py-5">
    <div class="container">

        <div class="row justify-content-center">
            <div class="col-md-7">

                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4">

                        <h3 class="fw-bold mb-3 text-center">
                            Create Your Account
                        </h3>
                        <p class="text-muted text-center mb-4">
                            Register to access Smart Contact Manager
                        </p>

                        <!-- Success / Error Messages -->
                        <div th:if="${message}" class="alert alert-success text-center">
                            <span th:text="${message}"></span>
                        </div>
                        <div th:if="${error}" class="alert alert-danger text-center">
                            <span th:text="${error}"></span>
                        </div>

                        <!-- Registration Form -->
                        <form th:action="@{/register}"  enctype="multipart/form-data"
                              th:object="${user}" method="post">

                            <!-- Name -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Full Name</label>
                                <input type="text"
                                       class="form-control"
                                       placeholder="Enter your name"
                                       th:field="*{name}">
                                <small class="text-danger" th:if="${#fields.hasErrors('name')}"
                                       th:errors="*{name}"></small>
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email"
                                       class="form-control"
                                       placeholder="example@gmail.com"
                                       th:field="*{email}">
                                <small class="text-danger" th:if="${#fields.hasErrors('email')}"
                                       th:errors="*{email}"></small>
                            </div>

                            <!-- Password -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Password</label>
                                <input type="password"
                                       class="form-control"
                                       placeholder="Create password"
                                       th:field="*{password}">
                                <small class="text-danger" th:if="${#fields.hasErrors('password')}"
                                       th:errors="*{password}"></small>
                            </div>

                            <!-- About -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">About You</label>
                                <textarea class="form-control"
                                          rows="3"
                                          placeholder="Write something about yourself"
                                          th:field="*{about}"></textarea>
                            </div>

                            <!-- Role & Enabled -->
                            <input type="hidden" th:field="*{role}" value="ROLE_USER">
                            <input type="hidden" th:field="*{enabled}" value="true">

                            <!-- Profile Image -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Profile Image</label>
                                <input type="file"
                                       class="form-control"
                                       accept="image/*"
                                       name="profileImage">
                                <small class="text-muted">Supported formats: JPG, PNG</small>
                            </div>

                            <!-- Submit -->
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    Register Account
                                </button>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>

    </div>
</section>

</body>
</html>

</div>
</section>

</body>
</html>
